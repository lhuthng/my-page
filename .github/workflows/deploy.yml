name: Deploy My Page

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "portfolio/**"
      - "blog/**"

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      portfolio: ${{ steps.filter.outputs.portfolio }}
      blog: ${{ steps.filter.outputs.blog }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            portfolio:
              - 'portfolio/**'
            blog_frontend:
              - 'blog/frontend/**'
            blog_backend:
              - 'blog/backend/**'
            blog_other:
              - 'blog/docker-compose.yml'

  deploy-portfolio:
    needs: filter
    if: needs.filter.outputs.portfolio == 'true' || contains(github.event.head_commit.message, '[deploy portfolio]')
    runs-on: ubuntu-latest
    steps:
      - name: Run portfolio deploy script on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "https://github.com/${{ github.repository }}.git"
            echo "${{ secrets.GH_PAT }}"

            REPO_DIR="/var/dev/my-page"
            LIVE_DIR="/var/www/portfolio"
            BRANCH="master"

            mkdir -p "$REPO_DIR"
            mkdir -p "$LIVE_DIR"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone -b "$BRANCH" "https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              git clean -fd
            fi

            cd "$REPO_DIR/portfolio"

            bun install
            bun run build

            rm -rf "$LIVE_DIR"/*
            cp -r dist/* "$LIVE_DIR"

            sudo systemctl reload nginx

            echo "Portfolio deployed successfully!"
  deploy-blog:
    needs: filter
    if: |
      needs.filter.outputs.blog_frontend == 'true' ||
      needs.filter.outputs.blog_backend == 'true' ||
      needs.filter.outputs.blog_other == 'true' ||
      contains(github.event.head_commit.message, '[deploy blog]')
    runs-on: ubuntu-latest
    steps:
      - name: Run blog deploy script on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            REPO_DIR="/var/dev/my-page"
            BLOG_DIR="$REPO_DIR/blog"
            BRANCH="master"

            mkdir -p "$REPO_DIR"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone -b "$BRANCH" "https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              git clean -fd
            fi

            cd "$BLOG_DIR"

            # Make sure Docker Compose is installed on VPS
            if [[ "${{ needs.filter.outputs.blog_backend }}" == "true" ]]; then
              echo "Backend changes detected. Full rebuild starting..."
              docker-compose up -d --build
            elif [[ "${{ needs.filter.outputs.blog_frontend }}" == "true" ]]; then
              echo "Only frontend changes detected. Updating frontend only..."
              # Build only the frontend service (replace 'frontend' with your service name in docker-compose)
              docker-compose up -d --build frontend
            else
              echo "Config changes detected. Refreshing containers..."
              docker-compose up -d
            fi

            echo "Blog deployed successfully!"
