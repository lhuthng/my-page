name: Deploy My Page

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "blog/**"
      - "socket-server/**"

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      socket: ${{ steps.filter.outputs.socket }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            blog:
              - 'blog/**'
            socket:
              - 'socket-server/**'

  # ── Build backend image on GitHub's servers and push to GHCR ─────────────
  build-push-backend:
    needs: filter
    if: needs.filter.outputs.blog == 'true' || contains(github.event.head_commit.message, '[deploy blog]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: blog/backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blog-backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build frontend image on GitHub's servers and push to GHCR ────────────
  build-push-frontend:
    needs: filter
    if: needs.filter.outputs.blog == 'true' || contains(github.event.head_commit.message, '[deploy blog]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: blog/frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blog-frontend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SSH into Oracle VM, pull new images, restart containers ───────────────
  # Required GitHub Secrets:
  #   VM_HOST      — Oracle VM public IP (141.147.45.193)
  #   VM_USER      — ubuntu
  #   VM_SSH_KEY   — private SSH key (~/.ssh/ssh-key-2026-04-10.key contents)
  #   GHCR_TOKEN   — GitHub PAT with read:packages scope (for VM to pull images)
  deploy-blog:
    needs: [build-push-backend, build-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ~/MyPage/blog
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  # ── Cross-compile Go binary and deploy to Oracle VM ───────────────────────
  # Required GitHub Secrets:
  #   WS_VM_HOST    — WebSocket VM public IP (130.61.121.230)
  #   WS_VM_USER    — ubuntu
  #   WS_VM_SSH_KEY — private SSH key contents for the WebSocket VM
  deploy-socket-server:
    needs: filter
    if: needs.filter.outputs.socket == 'true' || contains(github.event.head_commit.message, '[deploy ws]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: socket-server/go.mod
          cache-dependency-path: socket-server/go.sum

      - name: Build Linux binary
        working-directory: socket-server
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o server-linux .

      - name: Copy binary to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WS_VM_HOST }}
          username: ${{ secrets.WS_VM_USER }}
          key: ${{ secrets.WS_VM_SSH_KEY }}
          source: "socket-server/server-linux"
          target: "/tmp/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WS_VM_HOST }}
          username: ${{ secrets.WS_VM_USER }}
          key: ${{ secrets.WS_VM_SSH_KEY }}
          script: |
            sudo mv /tmp/socket-server/server-linux /usr/local/bin/socket-server
            sudo chmod +x /usr/local/bin/socket-server
            sudo systemctl restart socket-server
            sudo systemctl status socket-server --no-pager
