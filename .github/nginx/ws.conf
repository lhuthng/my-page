map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name wss.huuthangle.site;

    ssl_certificate     /etc/letsencrypt/live/wss.huuthangle.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wss.huuthangle.site/privkey.pem;   # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;                  # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                        # managed by Certbot

    # Health check
    location = / {
        proxy_pass http://127.0.0.1:5001/;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass         http://127.0.0.1:5001/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name wss.huuthangle.site;

    if ($host = wss.huuthangle.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    return 404;
}
