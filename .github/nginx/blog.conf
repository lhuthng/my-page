server {
    listen 80;
    server_name blog.huuthang.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.huuthang.site;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/blog.huuthang.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.huuthang.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
	# limit_req zone=blog burst=10 nodelay;

        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Inside the server block for blog.huuthang.site
location /api/ {
    # 1. Handle the "Preflight" OPTIONS request
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://portfolio.huuthang.site' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # 2. Handle the actual POST/GET request
    add_header 'Access-Control-Allow-Origin' 'https://portfolio.huuthang.site' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    # 3. Your existing proxy pass to the Docker container
    proxy_pass http://localhost:YOUR_DOCKER_PORT;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
}
