server {
    server_name blog.huuthangle.site;
    client_max_body_size 100M;

    # Media files served directly from backend — skips SvelteKit entirely
    location /media/ {
        proxy_pass         http://localhost:3001/media/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else goes to SvelteKit frontend
    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/blog.huuthangle.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.huuthangle.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = blog.huuthangle.site) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name blog.huuthangle.site;
    return 404;
}
