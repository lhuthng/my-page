server {
    listen 80;
    listen [::]:80;
    server_name huuthangle.site;
    return 301 https://blog.huuthang.site$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name huuthang.site;

    ssl_certificate /etc/letsencrypt/live/huuthangle.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/huuthangle.site/privkey.pem;

    return 301 https://blog.huuthang.site$request_uri;
}
