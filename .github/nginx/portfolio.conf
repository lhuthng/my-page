server {
    listen 80;
    listen [::]:80;
    server_name portfolio.huuthangle.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portfolio.huuthang.site;

    ssl_certificate /etc/letsencrypt/live/portfolio.huuthangle.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.huuthangle.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
