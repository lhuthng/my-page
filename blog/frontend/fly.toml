# Rename `app` to something unique on Fly.io before first deploy
app = "my-blog-frontend"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  # API_URL is set via `fly secrets set API_URL=http://<your-backend-app-name>.internal:3000`
  # Public origin of the backend — used by the server to rewrite media paths so
  # the browser fetches images directly from the backend instead of going through
  # the SvelteKit proxy (one fewer hop, no frontend memory pressure, and the
  # backend's Cache-Control / ETag headers reach the browser untouched).
  # Not a secret, so it lives here rather than in `fly secrets`.
  # Leave unset (or remove) to fall back to the /api/... proxy (safe for local dev).
  BACKEND_ORIGIN = "https://my-blog-backend.fly.dev"

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
