# Rename `app` to something unique on Fly.io before first deploy
app = "my-blog-frontend"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  # API_URL is set via `fly secrets set API_URL=http://<your-backend-app-name>.internal:3000`

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
