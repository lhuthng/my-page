# Rename `app` to something unique on Fly.io before running `fly launch`
app = "my-blog-backend"
primary_region = "sin"

[build]

[env]
  MEDIA_PATH = "/app/data/media"

[[mounts]]
  source      = "blog_data"
  destination = "/app/data"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
